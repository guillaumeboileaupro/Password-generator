name: Test Coverage

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - test/**
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libssl-dev

      - name: Run coverage check
        run: make coverage-check COVERAGE_MIN=95
