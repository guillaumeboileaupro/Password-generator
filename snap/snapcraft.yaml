name: mdp-generator
base: core22
version: "0.1.0"
title: Generateur de mots de passe
summary: Microphone-based password generator
description: |
  mdp-generator is a GTK desktop application for Ubuntu that captures
  microphone noise, hashes it with SHA-256, derives a pseudo-random byte
  stream, and generates passwords without modulo bias.
website: https://github.com/guillaumeboileaupro/Password-generator
source-code: https://github.com/guillaumeboileaupro/Password-generator
issues: https://github.com/guillaumeboileaupro/Password-generator/issues

grade: stable
confinement: strict

apps:
  mdp-generator:
    command: usr/bin/mdp-generator
    extensions: [gnome]
    desktop: snap/gui/mdp-generator.desktop
    plugs:
      - audio-record
      - home

parts:
  mdp-generator:
    plugin: make
    source: ..
    make-parameters:
      - PREFIX=/usr
    build-packages:
      - g++
      - pkg-config
      - libgtk-3-dev
      - libasound2-dev
      - libssl-dev
    stage-packages:
      - libgtk-3-0
      - libasound2
      - libssl3
